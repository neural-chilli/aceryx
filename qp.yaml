project: aceryx
description: workflow tool
default: check

tasks:
  # ── Infrastructure ─────────────────────────────────────────

  db:up:
    desc: Start Postgres in Docker
    cmd: docker compose up -d postgres
    check: docker compose ps postgres | grep -q running

  db:down:
    desc: Stop Postgres
    cmd: docker compose down

  db:reset:
    desc: Drop and recreate database
    deps: [db:up]
    cmd: |
      docker compose exec postgres psql -U aceryx -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
      docker compose exec postgres psql -U aceryx -c "CREATE EXTENSION IF NOT EXISTS pgcrypto; CREATE EXTENSION IF NOT EXISTS vector;"

  db:migrate:
    desc: Run database migrations
    deps: [db:up]
    cmd: |
      if [ -f .env ]; then set -a; . ./.env; set +a; fi
      go run ./cmd/aceryx migrate

  db:seed:
    desc: Seed database with dev data (default tenant, admin user, sample workflow)
    deps: [db:migrate]
    cmd: |
      if [ -f .env ]; then set -a; . ./.env; set +a; fi
      go run ./cmd/aceryx seed

  db:psql:
    desc: Open psql shell
    deps: [db:up]
    cmd: docker compose exec postgres psql -U aceryx

  db:fresh:
    desc: Full reset — drop, migrate, seed
    deps: [db:reset, db:migrate, db:seed]
    cmd: echo "✓ Database fresh"

  backup:
    desc: Create a backup
    cmd: ./aceryx backup --output ./backups/aceryx-$(date +%Y%m%d-%H%M%S).tar.gz

#  restore:
#    desc: Restore from backup (interactive — requires --confirm)
#    cmd: echo "Usage: ./aceryx restore --input <path> --confirm"

  # ── Build ──────────────────────────────────────────────────

  build:
    desc: Build Go binary with embedded frontend
    cmd: |
      cd frontend && npm run build
      cd ..
      go build -o aceryx ./cmd/aceryx

  build:backend:
    desc: Build Go binary only (requires frontend/dist to exist)
    cmd: go build -o aceryx ./cmd/aceryx

  build:frontend:
    desc: Build Vue frontend for production
    cmd: cd frontend && npm run build

  build:all:
    desc: Build everything
    deps: [build, build:frontend]
    cmd: echo "✓ Build complete"

  # ── Run ────────────────────────────────────────────────────

  serve:
    desc: Run backend server
    deps: [db:up, build]
    cmd: |
      if [ -f .env ]; then set -a; . ./.env; set +a; fi
      ./aceryx serve

  dev:backend:
    desc: Run backend with hot reload (requires air)
    deps: [db:up]
    cmd: |
      if [ -f .env ]; then set -a; . ./.env; set +a; fi
      if [ -f .air.toml ] && command -v air >/dev/null 2>&1; then
        air -c .air.toml
      else
        go run ./cmd/aceryx serve
      fi

  dev:frontend:
    desc: Run Vite dev server with HMR
    cmd: cd frontend && npm run dev -- --host 127.0.0.1 --port 5173

  dev:
    desc: Run backend + frontend dev servers
    deps: [db:up, dev:backend, dev:frontend]
    parallel: true
    cmd: echo "✓ Dev servers running"

  # ── Test ───────────────────────────────────────────────────

  test:
    desc: Run Go unit tests
    cmd: go test ./... -count=1 -race

  test:integration:
    desc: Run Go integration tests (uses testcontainers — no external Postgres needed)
    cmd: go test ./tests/integration/... -count=1 -tags=integration -race

  test:bdd:
    desc: Run BDD scenarios
    deps: [db:up]
    cmd: go test ./tests/bdd/... -count=1 -tags=bdd

  test:frontend:
    desc: Run Vitest unit tests
    cmd: cd frontend && npm run test:unit

  test:e2e:
    desc: Run Playwright e2e tests against full stack
    deps: [db:up]
    cmd: cd frontend && npx playwright test

  test:all:
    desc: Run all tests
    steps:
      - test
      - test:integration
#      - test:bdd
      - test:frontend

  # ── Lint ───────────────────────────────────────────────────

  fmt:
    desc: Format Go code
    cmd: gofmt -w .

  lint:
    desc: Lint Go code
    cmd: golangci-lint run ./...

  lint:frontend:
    desc: Lint and type-check frontend
    cmd: cd frontend && npm run lint && npm run type-check

  lint:all:
    desc: Lint everything
    deps: [fmt, lint, lint:frontend]
    cmd: echo "✓ All linting passed"

  # ── Guards (AGENTS.md verification protocol) ───────────────

  guards:
    desc: Run all guards — must pass before any merge
    deps: [fmt, lint, test]
    cmd: echo "✓ All guards passed"

  guards:full:
    desc: Run all guards including integration and frontend
    deps: [fmt, lint:all, test:all]
    cmd: echo "✓ All guards passed (full suite)"

  # ── Code Generation ────────────────────────────────────────

  generate:
    desc: Run all code generators (if any)
    cmd: go generate ./...

  # ── Dependencies ───────────────────────────────────────────

  deps:
    desc: Install Go dependencies
    cmd: go mod tidy

  deps:frontend:
    desc: Install frontend dependencies
    cmd: cd frontend && npm install

  deps:all:
    desc: Install all dependencies
    deps: [deps, deps:frontend]
    cmd: echo "✓ All dependencies installed"

  env:init:
    desc: Create .env from .env.example (if missing)
    cmd: |
      if [ -f .env ]; then
        echo "✓ .env already exists"
      else
        cp .env.example .env
        echo "✓ Created .env from .env.example"
      fi

  deps:tools:
    desc: Install development tools
    cmd: |
      go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      go install github.com/air-verse/air@latest
      echo "✓ Tools installed"

  # ── Docker ─────────────────────────────────────────────────

  docker:build:
    desc: Build Docker image
    cmd: docker build -t aceryx:dev .

  docker:run:
    desc: Run full stack in Docker
    cmd: docker compose --profile full up -d

  docker:stop:
    desc: Stop all Docker services
    cmd: docker compose --profile full down

  # ── Utility ────────────────────────────────────────────────

  clean:
    desc: Remove build artifacts
    cmd: |
      rm -f aceryx
      rm -rf frontend/dist
      rm -rf data/

  loc:
    desc: Count lines of code
    cmd: |
      go_lines=$(find . -name '*.go' -not -path './vendor/*' | xargs wc -l | tail -1 | awk '{print $1}')
      vue_lines=$(find frontend/src \( -name '*.vue' -o -name '*.ts' \) | xargs wc -l | tail -1 | awk '{print $1}')
      sql_lines=$(find migrations -name '*.sql' | xargs wc -l | tail -1 | awk '{print $1}')

      max_width=$(printf "%s\n" "$go_lines" "$vue_lines" "$sql_lines" $((go_lines + vue_lines + sql_lines)) | awk '{print length}' | sort -nr | head -1)
      printf "%-7s %*d\n" "Go:"     "$max_width" "$go_lines"
      printf "%-7s %*d\n" "Vue/TS:" "$max_width" "$vue_lines"
      printf "%-7s %*d\n" "SQL:"    "$max_width" "$sql_lines"
      printf "%-7s %*d\n" "Total:"  "$max_width" $((go_lines + vue_lines + sql_lines))

  check:imports:
    desc: Verify no cross-package internal imports (AGENTS.md rule)
    cmd: |
      echo "Checking for forbidden internal imports..."
      VIOLATIONS=$(grep -rn 'internal/.*/' internal/ --include='*.go' | grep -v '_test.go' | grep -v 'internal/engine/' | grep 'internal/[a-z]*/[a-z]' || true)
      if [ -n "$VIOLATIONS" ]; then
        echo "❌ Cross-package internal imports found:"
        echo "$VIOLATIONS"
        exit 1
      fi
      echo "✓ No cross-package internal imports"

  vet:
    desc: Run go vet
    scope: cmd
    cmd: go vet ./...
    safety: idempotent

  vulncheck:
    desc: Run go vulncheck
    scope: cmd
    cmd: govulncheck ./...
    safety: idempotent

  check:
    desc: Run the default local verification pipeline
    scope: cmd
    needs:
      - fmt
      - lint
    steps:
      - test:all
      - vet
      - build
      - arch-check
      - vulncheck
    safety: idempotent

  arch-check:
    desc: Enforce internal package boundaries and layer direction
    cmd: qp arch-check --json
    scope: cmd
    safety: idempotent
    agent_visible: true
    agent_hint: >
      Run this after any change that adds or modifies import statements.
      Failures indicate a package boundary or layer violation — fix the
      dependency direction, extract a shared interface, or move logic
      to the correct layer.

  # ─────────────────────────────────────────────────────────────────
  # Aceryx — qp.yaml (architecture, scope, and arch-check sections)
  # ─────────────────────────────────────────────────────────────────

  # ── Scopes ──────────────────────────────────────────────────────
  #
  # Scopes define the boundaries of the codebase. Every task should
  # reference a scope. Agents use scopes to understand which files
  # are relevant to a given piece of work.

scopes:
  # ── Foundation ──────────────────────────────────────────────
  audit:
    desc: Append-only event recording, hash chain, verification
    root: internal/audit
    include: ["**/*.go"]

  rbac:
    desc: Principals, roles, permissions, Authorize function
    root: internal/rbac
    include: ["**/*.go"]

  expressions:
    desc: JavaScript expression evaluation via goja
    root: internal/expressions
    include: ["**/*.go"]

  # ── Core ────────────────────────────────────────────────────
  workflows:
    desc: Workflow AST, YAML serialisation, versioning
    root: internal/workflows
    include: ["**/*.go"]

  cases:
    desc: Case CRUD, case type schema validation, lifecycle
    root: internal/cases
    include: ["**/*.go"]

  connectors:
    desc: Connector interface, registry, built-in implementations
    root: internal/connectors
    include: ["**/*.go"]

  vault:
    desc: Document storage, metadata, content hashing
    root: internal/vault
    include: ["**/*.go"]

  # ── Domain ──────────────────────────────────────────────────
  engine:
    desc: DAG scheduler, step lifecycle, recovery
    root: internal/engine
    include: ["**/*.go"]

  steps:
    desc: Step execution dispatch (human, agent, integration, rule, timer)
    root: internal/steps
    include: ["**/*.go"]

  tasks:
    desc: Human task assignment, claiming, completion, SLA, escalation
    root: internal/tasks
    include: ["**/*.go"]

  agents:
    desc: Agent step execution, context assembly, LLM invocation
    root: internal/agents
    include: ["**/*.go"]

  notify:
    desc: Notification dispatch (email, WebSocket)
    root: internal/notify
    include: ["**/*.go"]

  search:
    desc: Full-text search across cases
    root: internal/search
    include: ["**/*.go"]

  plugins:
    desc: Two-tier plugin runtime (goja + Wazero/WASM)
    root: internal/plugins
    include: ["**/*.go"]

  mcpclient:
    desc: MCP client — outbound tool invocation
    root: internal/mcpclient
    include: ["**/*.go"]

  mcpserver:
    desc: MCP server — expose Aceryx as an MCP tool provider
    root: internal/mcpserver
    include: ["**/*.go"]

  rag:
    desc: RAG infrastructure, pgvector, document chunking
    root: internal/rag
    include: ["**/*.go"]

  reasoning:
    desc: Agentic reasoning steps, visual tool connections
    root: internal/reasoning
    include: ["**/*.go"]

  # ── API ─────────────────────────────────────────────────────
  handlers:
    desc: HTTP handlers grouped by domain
    root: api/handlers
    include: ["**/*.go"]

  middleware:
    desc: Auth, RBAC, logging, recovery middleware
    root: api/middleware
    include: ["**/*.go"]

  routes:
    desc: Route registration
    root: api
    include: ["routes.go"]

  # ── CLI / Entrypoint ────────────────────────────────────────
  cmd:
    desc: Main entrypoint and CLI wiring
    root: cmd/aceryx
    include: ["**/*.go"]

  # ── Migrations ──────────────────────────────────────────────
  migrations:
    desc: Forward-only SQL schema migrations
    root: migrations
    include: ["**/*.sql"]

  # ── Frontend ────────────────────────────────────────────────
  frontend-views:
    desc: Page-level Vue components (inbox, case view, builder)
    root: frontend/src/views
    include: ["**/*.vue", "**/*.ts"]

  frontend-components:
    desc: Reusable PrimeVue UI components
    root: frontend/src/components
    include: ["**/*.vue", "**/*.ts"]

  frontend-composables:
    desc: Vue composables (API client, WebSocket, auth)
    root: frontend/src/composables
    include: ["**/*.ts"]

  # ── Docs & Specs ────────────────────────────────────────────
  specs:
    desc: Feature specifications (BDD scenarios, design decisions)
    root: docs/specs
    include: ["**/*.md"]

  design:
    desc: Design documents and architecture decisions
    root: docs/design
    include: ["**/*.md"]


  # ── Architecture ────────────────────────────────────────────────
  #
  # Layers enforce dependency direction. Domains enforce feature
  # isolation. cross_domain: deny prevents same-layer packages from
  # importing each other's internals. direction: forward prevents
  # lower layers from importing higher layers.
  #
  # Layer order (forward = left to right):
  #   foundation → core → domain → orchestration → api → cmd
  #
  # Foundation packages (audit, rbac, expressions) are importable
  # by everything above them. Core packages (workflows, cases,
  # connectors, vault) are importable by domain and above.
  # Domain packages must NOT import each other — they communicate
  # through the engine or through interfaces.

architecture:
  layers:
    - foundation
    - core
    - domain
    - orchestration
    - api
    - cmd

  domains:
    # ── Foundation ──────────────────────────────────────────
    audit:
      root: internal/audit
      layers: [foundation]

    rbac:
      root: internal/rbac
      layers: [foundation]

    expressions:
      root: internal/expressions
      layers: [foundation]

    # ── Core ────────────────────────────────────────────────
    workflows:
      root: internal/workflows
      layers: [core]

    cases:
      root: internal/cases
      layers: [core]

    connectors:
      root: internal/connectors
      layers: [core]

    vault:
      root: internal/vault
      layers: [core]

    # ── Domain ──────────────────────────────────────────────
    steps:
      root: internal/steps
      layers: [domain]

    tasks:
      root: internal/tasks
      layers: [domain]

    agents:
      root: internal/agents
      layers: [domain]

    notify:
      root: internal/notify
      layers: [domain]

    search:
      root: internal/search
      layers: [domain]

    plugins:
      root: internal/plugins
      layers: [domain]

    mcpclient:
      root: internal/mcpclient
      layers: [domain]

    mcpserver:
      root: internal/mcpserver
      layers: [domain]

    rag:
      root: internal/rag
      layers: [domain]

    reasoning:
      root: internal/reasoning
      layers: [domain]

    # ── Orchestration ───────────────────────────────────────
    engine:
      root: internal/engine
      layers: [orchestration]

    # ── API ─────────────────────────────────────────────────
    handlers:
      root: api/handlers
      layers: [api]

    middleware:
      root: api/middleware
      layers: [api]

    # ── CMD ─────────────────────────────────────────────────
    cli:
      root: cmd/aceryx
      layers: [cmd]

  rules:
    # Imports must flow forward through the layer stack.
    # foundation → core → domain → orchestration → api → cmd.
    # A core package cannot import a domain package.
    # A domain package cannot import the engine.
    - direction: forward




  # ── Guard Integration ───────────────────────────────────────────
  #
  # Add arch-check to the default guard so it runs on every commit.
  # Place it after vet and before build — if the architecture is
  # broken, there's no point building.

guards:
  default:
    steps:
      - test
      - vet
      - arch-check
      - build