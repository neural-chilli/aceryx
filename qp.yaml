project: aceryx
description: workflow tool
default: check

tasks:
  # ── Infrastructure ─────────────────────────────────────────

  db:up:
    desc: Start Postgres in Docker
    cmd: docker compose up -d postgres
    check: docker compose ps postgres | grep -q running

  db:down:
    desc: Stop Postgres
    cmd: docker compose down

  db:reset:
    desc: Drop and recreate database
    deps: [db:up]
    cmd: |
      docker compose exec postgres psql -U aceryx -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
      docker compose exec postgres psql -U aceryx -c "CREATE EXTENSION IF NOT EXISTS pgcrypto; CREATE EXTENSION IF NOT EXISTS vector;"

  db:migrate:
    desc: Run database migrations
    deps: [db:up]
    cmd: go run ./cmd/aceryx migrate

  db:seed:
    desc: Seed database with dev data (default tenant, admin user, sample workflow)
    deps: [db:migrate]
    cmd: go run ./cmd/aceryx seed

  db:psql:
    desc: Open psql shell
    deps: [db:up]
    cmd: docker compose exec postgres psql -U aceryx

  db:fresh:
    desc: Full reset — drop, migrate, seed
    deps: [db:reset, db:migrate, db:seed]
    cmd: echo "✓ Database fresh"

  backup:
    desc: Create a backup
    cmd: ./aceryx backup --output ./backups/aceryx-$(date +%Y%m%d-%H%M%S).tar.gz

#  restore:
#    desc: Restore from backup (interactive — requires --confirm)
#    cmd: echo "Usage: ./aceryx restore --input <path> --confirm"

  # ── Build ──────────────────────────────────────────────────

  build:
    desc: Build Go binary with embedded frontend
    cmd: |
      cd frontend && npm run build
      cd ..
      go build -o aceryx ./cmd/aceryx

  build:backend:
    desc: Build Go binary only (requires frontend/dist to exist)
    cmd: go build -o aceryx ./cmd/aceryx

  build:frontend:
    desc: Build Vue frontend for production
    cmd: cd frontend && npm run build

  build:all:
    desc: Build everything
    deps: [build, build:frontend]
    cmd: echo "✓ Build complete"

  # ── Run ────────────────────────────────────────────────────

  serve:
    desc: Run backend server
    deps: [db:up, build]
    cmd: ./aceryx serve

  dev:backend:
    desc: Run backend with hot reload (requires air)
    deps: [db:up]
    cmd: air -c .air.toml

  dev:frontend:
    desc: Run Vite dev server with HMR
    cmd: cd frontend && npm run dev

  dev:
    desc: Run backend + frontend dev servers
    deps: [db:up, dev:backend, dev:frontend]
    parallel: true
    cmd: echo "✓ Dev servers running"

  # ── Test ───────────────────────────────────────────────────

  test:
    desc: Run Go unit tests
    cmd: go test ./... -count=1 -race

  test:integration:
    desc: Run Go integration tests (uses testcontainers — no external Postgres needed)
    cmd: go test ./tests/integration/... -count=1 -tags=integration -race

  test:bdd:
    desc: Run BDD scenarios
    deps: [db:up]
    cmd: go test ./tests/bdd/... -count=1 -tags=bdd

  test:frontend:
    desc: Run Vitest unit tests
    cmd: cd frontend && npm run test:unit

  test:e2e:
    desc: Run Playwright e2e tests against full stack
    deps: [db:up]
    cmd: cd frontend && npx playwright test

  test:all:
    desc: Run all tests
    deps: [test, test:integration, test:bdd, test:frontend]
    cmd: echo "✓ All tests passed"

  # ── Lint ───────────────────────────────────────────────────

  fmt:
    desc: Format Go code
    cmd: gofmt -w .

  lint:
    desc: Lint Go code
    cmd: golangci-lint run ./...

  lint:frontend:
    desc: Lint and type-check frontend
    cmd: cd frontend && npm run lint && npm run type-check

  lint:all:
    desc: Lint everything
    deps: [fmt, lint, lint:frontend]
    cmd: echo "✓ All linting passed"

  # ── Guards (AGENTS.md verification protocol) ───────────────

  guards:
    desc: Run all guards — must pass before any merge
    deps: [fmt, lint, test]
    cmd: echo "✓ All guards passed"

  guards:full:
    desc: Run all guards including integration and frontend
    deps: [fmt, lint:all, test:all]
    cmd: echo "✓ All guards passed (full suite)"

  # ── Code Generation ────────────────────────────────────────

  generate:
    desc: Run all code generators (if any)
    cmd: go generate ./...

  # ── Dependencies ───────────────────────────────────────────

  deps:
    desc: Install Go dependencies
    cmd: go mod tidy

  deps:frontend:
    desc: Install frontend dependencies
    cmd: cd frontend && npm install

  deps:all:
    desc: Install all dependencies
    deps: [deps, deps:frontend]
    cmd: echo "✓ All dependencies installed"

  deps:tools:
    desc: Install development tools
    cmd: |
      go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      go install github.com/air-verse/air@latest
      echo "✓ Tools installed"

  # ── Docker ─────────────────────────────────────────────────

  docker:build:
    desc: Build Docker image
    cmd: docker build -t aceryx:dev .

  docker:run:
    desc: Run full stack in Docker
    cmd: docker compose --profile full up -d

  docker:stop:
    desc: Stop all Docker services
    cmd: docker compose --profile full down

  # ── Utility ────────────────────────────────────────────────

  clean:
    desc: Remove build artifacts
    cmd: |
      rm -f aceryx
      rm -rf frontend/dist
      rm -rf data/

  loc:
    desc: Count lines of code
    cmd: |
      go_lines=$(find . -name '*.go' -not -path './vendor/*' | xargs wc -l | tail -1 | awk '{print $1}')
      vue_lines=$(find frontend/src \( -name '*.vue' -o -name '*.ts' \) | xargs wc -l | tail -1 | awk '{print $1}')
      sql_lines=$(find migrations -name '*.sql' | xargs wc -l | tail -1 | awk '{print $1}')

      max_width=$(printf "%s\n" "$go_lines" "$vue_lines" "$sql_lines" $((go_lines + vue_lines + sql_lines)) | awk '{print length}' | sort -nr | head -1)
      printf "%-7s %*d\n" "Go:"     "$max_width" "$go_lines"
      printf "%-7s %*d\n" "Vue/TS:" "$max_width" "$vue_lines"
      printf "%-7s %*d\n" "SQL:"    "$max_width" "$sql_lines"
      printf "%-7s %*d\n" "Total:"  "$max_width" $((go_lines + vue_lines + sql_lines))

  check:imports:
    desc: Verify no cross-package internal imports (AGENTS.md rule)
    cmd: |
      echo "Checking for forbidden internal imports..."
      VIOLATIONS=$(grep -rn 'internal/.*/' internal/ --include='*.go' | grep -v '_test.go' | grep -v 'internal/engine/' | grep 'internal/[a-z]*/[a-z]' || true)
      if [ -n "$VIOLATIONS" ]; then
        echo "❌ Cross-package internal imports found:"
        echo "$VIOLATIONS"
        exit 1
      fi
      echo "✓ No cross-package internal imports"

  vet:
    desc: Run go vet
    scope: cli
    cmd: go vet ./...
    safety: idempotent

  vulncheck:
    desc: Run go vulncheck
    scope: cli
    cmd: govulncheck ./...
    safety: idempotent

  check:
    desc: Run the default local verification pipeline
    scope: cli
    needs:
      - fmt
      - lint
    steps:
      - test
      - vet
      - build
      - arch-check
      - vulncheck
    safety: idempotent

  arch-check:
    desc: Enforce internal package boundaries
    cmd: qp arch-check --json
    scope: cli
    safety: idempotent

scopes:
  cli:
    desc: Main CLI commands and closely-related execution packages.
    paths:
      - cmd/aceryx/
      - internal/engine/
      - internal/connectors/
      - internal/expressions/
      - internal/migrations/
      - internal/search/
      - internal/rbac/

guards:
  default:
    steps:
      - test
      - vet
      - build

architecture:
  layers:
    - foundation
    - core
    - features
    - cli

  domains:
    foundation:
      root: internal/ordered
      layers: [foundation]

    cel:
      root: internal/cel
      layers: [foundation]

    config:
      root: internal/config
      layers: [core]

    runner:
      root: internal/runner
      layers: [core]

    guard:
      root: internal/guard
      layers: [features]

    repair:
      root: internal/repair
      layers: [features]

    plan:
      root: internal/plan
      layers: [features]

    context:
      root: internal/context
      layers: [features]

    brief:
      root: internal/brief
      layers: [features]

    scope:
      root: internal/scope
      layers: [features]

    prompt:
      root: internal/prompt
      layers: [features]

    codemap:
      root: internal/codemap
      layers: [features]

    initcmd:
      root: internal/initcmd
      layers: [features]

    archcheck:
      root: internal/archcheck
      layers: [features]

    watch:
      root: internal/watch
      layers: [features]

    mcp:
      root: internal/mcp
      layers: [features]

    cli:
      root: cmd/qp
      layers: [cli]

  rules:
    - direction: forward
