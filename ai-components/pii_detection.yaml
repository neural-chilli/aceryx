# Detects personally identifiable information in text.
id: pii_detection
display_label: "Detect PII"
category: "AI: Data Quality"
description: "Detect PII entities and return locations plus risk level."
icon: "privacy"
tier: commercial

input_schema:
  type: object
  properties:
    text:
      type: string
  required: [text]

output_schema:
  type: object
  properties:
    pii_fields:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
            enum: [name, email, phone, ssn, address, card_number, date_of_birth, other]
          value:
            type: string
          location:
            type: string
        required: [type, value, location]
    risk_level:
      type: string
      enum: [low, medium, high, critical]
    confidence:
      type: number
      minimum: 0
      maximum: 1
  required: [pii_fields, risk_level, confidence]

system_prompt: |
  You are a PII detection engine.
  Identify PII in the input and return only JSON matching the schema.

user_prompt_template: |
  Detect all PII in this text and provide positions/locations:
  {{.Input.text}}

model_hints:
  requires_vision: false
  preferred_size: medium
  max_tokens: 900

confidence:
  field_path: "confidence"
  auto_accept_above: 0.95
  escalate_below: 0.7

config_fields: []
