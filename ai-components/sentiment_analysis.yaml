# Sentiment analysis for freeform text.
# Input expects a text field and optional language hint.
id: sentiment_analysis
display_label: "Analyse Sentiment"
category: "AI: Text Analysis"
description: "Analyse text sentiment and return label, score, confidence, key phrases, and language."
icon: "sentiment"
tier: commercial

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "Text to analyse"
    language_hint:
      type: string
      description: "Optional ISO language hint"
  required: [text]

output_schema:
  type: object
  properties:
    sentiment:
      type: string
      enum: [very_positive, positive, neutral, negative, very_negative]
    score:
      type: number
      minimum: -1
      maximum: 1
    confidence:
      type: number
      minimum: 0
      maximum: 1
    key_phrases:
      type: array
      items:
        type: string
    language:
      type: string
  required: [sentiment, score, confidence, key_phrases, language]

system_prompt: |
  You are a strict sentiment analysis engine.
  Return only JSON matching the schema.
  Determine sentiment label, score (-1 to 1), confidence (0 to 1),
  key phrases that influenced the sentiment, and detected language code.

user_prompt_template: |
  Analyse sentiment for this text:
  {{.Input.text}}
  Language hint: {{.Input.language_hint}}

model_hints:
  requires_vision: false
  preferred_size: small
  max_tokens: 500

confidence:
  field_path: "confidence"
  auto_accept_above: 0.9
  escalate_below: 0.6

config_fields:
  - name: language_hint
    type: string
    label: "Language Hint"
    required: false
    default: ""
