name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0

      - name: Unit tests
        run: go test ./internal/... -count=1 -race

      - name: Integration tests
        run: go test ./tests/integration/... -count=1 -tags=integration -race

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Unit tests
        run: cd frontend && npm run test:unit
